version: "3.9"   # latest compose version

services:
  db:
    image: postgres:16-alpine          # lightweight official image
    container_name: gocrud-poc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: myuser        # ← desired username
      POSTGRES_PASSWORD: mypassword   # ← desired password
      POSTGRES_DB: mydb        # ← database created at startup
    ports:
      - "5432:5432"                    # expose to host (optional)
    volumes:
      - pg_data:/var/lib/postgresql/data  # persist data

volumes:
  pg_data:
